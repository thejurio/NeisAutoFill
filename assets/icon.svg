<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 둥근 사각 배경 -->
  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#bg)"/>
  <rect x="20" y="20" width="216" height="216" rx="52" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

  <!-- 성적 문서 -->
  <g filter="url(#shadow)">
    <rect x="70" y="58" width="104" height="132" rx="14" fill="#ffffff"/>
  </g>

  <!-- 평가 항목 3줄 (등급 라인) -->
  <g stroke-linecap="round">
    <circle cx="90" cy="90" r="6" fill="#34d399"/>
    <rect x="104" y="85" width="52" height="9" rx="4.5" fill="#cbd5e1"/>

    <circle cx="90" cy="118" r="6" fill="#fbbf24"/>
    <rect x="104" y="113" width="44" height="9" rx="4.5" fill="#cbd5e1"/>

    <circle cx="90" cy="146" r="6" fill="#f87171"/>
    <rect x="104" y="141" width="48" height="9" rx="4.5" fill="#cbd5e1"/>
  </g>

  <!-- 자동 완료 체크 배지 -->
  <g filter="url(#shadow)">
    <circle cx="178" cy="176" r="42" fill="url(#check)"/>
    <path d="M158 176 l14 15 l26 -30" fill="none" stroke="#ffffff" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
